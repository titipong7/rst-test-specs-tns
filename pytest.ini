[pytest]
testpaths = tests
asyncio_mode = auto
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_date_format = %Y-%m-%dT%H:%M:%S

markers =
    epp: EPP (XML over TCP/TLS) test cases
    rdap: RDAP (REST/JSON) test cases
    slow: tests that take longer to run (e.g. TLS probes)
